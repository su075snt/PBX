<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Học Kanji Lớp 1</title>
    <style>
        :root { --primary: #0984e3; --danger: #d63031; --bg: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); overflow: hidden; height: 100vh; }

        /* MÀN HÌNH CHÍNH (DANH MỤC) */
        #home-screen { 
            height: 100vh; display: flex; flex-direction: column; padding: env(safe-area-inset-top) 20px; 
            overflow-y: auto; 
        }
        .grid-kanji { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); 
            gap: 15px; padding: 20px 0;
        }
        .card-kanji { 
            aspect-ratio: 1/1; border: 2px solid #333; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold;
            cursor: pointer; transition: 0.2s;
        }
        .card-kanji:active { background: #eee; transform: scale(0.9); }

        /* MÀN HÌNH HỌC */
        #learn-screen { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: white; display: none; flex-direction: column; z-index: 100;
        }
        .nav-top { 
            padding: 10px 20px; border-bottom: 1px solid #eee; display: flex; 
            justify-content: space-between; align-items: center; padding-top: env(safe-area-inset-top);
        }
        .btn-back { padding: 8px 15px; border: none; background: #eee; border-radius: 8px; font-weight: bold; }

        /* Bố cục chia đôi Trái - Phải */
        .main-view { flex: 1; display: flex; flex-direction: row; overflow: hidden; }
        .box { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; }
        
        #kanji-gif { max-width: 90%; max-height: 90%; border-radius: 12px; border: 1px solid #eee; }

        /* Bảng vẽ */
        .canvas-container { position: relative; width: 95%; aspect-ratio: 1/1; max-width: 400px; border: 2px solid #333; background: white; }
        canvas { width: 100%; height: 100%; touch-action: none; background-image: linear-gradient(#f0f0f0 1px, transparent 1px), linear-gradient(90deg, #f0f0f0 1px, transparent 1px); background-size: 50% 50%; }
        #trace-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 200px; color: rgba(0,0,0,0.05); pointer-events: none; }

        /* Footer cho iPhone */
        .footer { 
            padding: 15px; border-top: 1px solid #eee; display: flex; justify-content: center;
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
        }
        .btn-clear { width: 80%; max-width: 300px; padding: 15px; border: none; border-radius: 12px; background: var(--danger); color: white; font-weight: bold; font-size: 16px; }

        /* XOAY DỌC (Mobile) */
        @media (max-aspect-ratio: 1/1) {
            .main-view { flex-direction: column; }
            .box { height: 50%; width: 100%; }
        }
    </style>
</head>
<body>

    <!-- MÀN HÌNH CHÍNH -->
    <div id="home-screen">
        <h2 style="text-align:center; margin-top:10px;">Kanji Lớp 1</h2>
        <div class="grid-kanji" id="kanjiGrid">
            <!-- Danh sách 80 chữ - Bạn có thể thêm tiếp vào đây -->
            <script>
                const kanjiList = ["一", "二", "三", "五", "西", "日", "月", "火", "水", "木", "金", "土", "山", "川", "田"];
                document.write(kanjiList.map(k => `<div class="card-kanji" onclick="startLearn('${k}')">${k}</div>`).join(''));
            </script>
        </div>
    </div>

    <!-- MÀN HÌNH LUYỆN TẬP -->
    <div id="learn-screen">
        <div class="nav-top">
            <button class="btn-back" onclick="goHome()">← Quay lại</button>
            <h2 id="current-title">字</h2>
            <div style="width: 50px;"></div>
        </div>

        <div class="main-view">
            <div class="box">
                <!-- KHUNG HIỂN THỊ FILE GIF -->
                <img id="kanji-gif" src="" alt="Đang tải hướng dẫn...">
            </div>
            <div class="box">
                <div class="canvas-container">
                    <div id="trace-text">一</div>
                    <canvas id="canvas"></canvas>
                </div>
            </div>
        </div>

        <div class="footer">
            <button class="btn-clear" onclick="clearBoard()">XÓA BẢNG VẼ</button>
        </div>
    </div>

    <script>
        const home = document.getElementById('home-screen');
        const learn = document.getElementById('learn-screen');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const gif = document.getElementById('kanji-gif');
        const trace = document.getElementById('trace-text');
        let drawing = false;

        // ĐƯỜNG DẪN THƯ MỤC ẢNH (Bỏ trống nếu ảnh nằm cùng thư mục file html)
        // Nếu bạn để ảnh trong thư mục 'images', hãy sửa thành: const folder = "images/";
        const folder = ""; 

        function startLearn(k) {
            home.style.display = 'none';
            learn.style.display = 'flex';
            document.getElementById('current-title').innerText = "Chữ: " + k;
            trace.innerText = k;

            // KHỚP TÊN FILE: TênChữ + "-order.gif" (Ví dụ: 西-order.gif)
            gif.src = folder + k + "-order.gif";

            setTimeout(resize, 100); 
        }

        function goHome() {
            home.style.display = 'flex';
            learn.style.display = 'none';
            gif.src = ""; // Dừng tải ảnh khi quay lại
        }

        function resize() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            clearBoard();
        }

        function clearBoard() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        // LOGIC VẼ (Tối ưu iPhone & Xoay màn hình)
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: cx - rect.left, y: cy - rect.top };
        }

        function start(e) { drawing = true; draw(e); }
        function stop() { drawing = false; ctx.beginPath(); }
        function draw(e) {
            if (!drawing) return;
            const p = getPos(e);
            ctx.lineWidth = 12; ctx.lineCap = 'round'; ctx.strokeStyle = '#2d3436';
            ctx.lineTo(p.x, p.y); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(p.x, p.y);
            if(e.touches) e.preventDefault();
        }

        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', stop);
        canvas.addEventListener('touchstart', (e) => { start(e); }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { draw(e); }, {passive: false});
        window.addEventListener('touchend', stop);

        window.addEventListener('resize', resize);
        window.addEventListener('orientationchange', () => setTimeout(resize, 300));
    </script>
</body>
</html>
