<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Kanji Lớp 1</title>
    <style>
        :root { --bg: #f8f9fa; --text: #2d3436; --accent: #0984e3; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Danh sách chữ - Cuộn ngang trên mobile, lưới trên desktop */
        .kanji-nav { 
            display: flex; gap: 8px; padding: 10px; background: white; 
            overflow-x: auto; border-bottom: 1px solid #ddd; white-space: nowrap;
            scrollbar-width: none; /* Ẩn scrollbar Firefox */
        }
        .kanji-nav::-webkit-scrollbar { display: none; } /* Ẩn scrollbar Chrome */
        
        .btn-kanji { 
            min-width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;
            background: #eee; border-radius: 8px; cursor: pointer; font-size: 20px; font-weight: bold;
        }
        .btn-kanji:active { background: var(--accent); color: white; }

        /* Bố cục chính: Full màn hình */
        .main-view { flex: 1; display: flex; flex-wrap: wrap; height: 100%; }

        /* Khung bên trái (GIF) & Phải (Vẽ) */
        .box { flex: 1; min-width: 300px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; border: 1px solid #eee; }
        
        #kanji-gif { width: 90%; max-width: 350px; height: auto; border-radius: 12px; }

        /* Bảng vẽ */
        .canvas-container { position: relative; width: 90%; max-width: 350px; aspect-ratio: 1/1; background: white; border: 2px solid #333; border-radius: 8px; }
        canvas { width: 100%; height: 100%; cursor: crosshair; touch-action: none; 
            background-image: linear-gradient(#eee 1px, transparent 1px), linear-gradient(90deg, #eee 1px, transparent 1px);
            background-size: 50% 50%;
        }

        /* Nút điều khiển */
        .controls { width: 100%; display: flex; justify-content: center; padding: 15px; background: white; }
        .btn-clear { width: 80%; max-width: 400px; padding: 12px; background: #ff7675; color: white; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; }

        @media (max-width: 600px) {
            .main-view { flex-direction: column; overflow-y: auto; }
            .box { min-width: 100%; height: 50%; }
        }
    </style>
</head>
<body>

    <!-- Danh sách chữ (Bạn chỉ cần copy thêm các chữ khác vào đây) -->
    <div class="kanji-nav">
        <div class="btn-kanji" onclick="load('一')">一</div>
        <div class="btn-kanji" onclick="load('二')">二</div>
        <div class="btn-kanji" onclick="load('三')">三</div>
        <div class="btn-kanji" onclick="load('五')">五</div>
        <div class="btn-kanji" onclick="load('西')">西</div>
        <!-- Thêm các chữ khác... -->
    </div>

    <div class="main-view">
        <div class="box">
            <img id="kanji-gif" src="" alt="GIF">
        </div>
        <div class="box">
            <div class="canvas-container">
                <canvas id="canvas"></canvas>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-clear" onclick="clearBoard()">XÓA BẢNG</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const gif = document.getElementById('kanji-gif');
        let drawing = false;

        // Tự động điều chỉnh kích thước canvas khi load
        function resize() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }

        function load(char) {
            gif.src = char + "-order.gif"; // Khớp file 一-order.gif trong thư mục của bạn
            clearBoard();
        }

        // Logic vẽ mượt mà
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function start(e) { drawing = true; draw(e); }
        function stop() { drawing = false; ctx.beginPath(); }
        function draw(e) {
            if (!drawing) return;
            const p = getPos(e);
            ctx.lineWidth = 10;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#2d3436';
            ctx.lineTo(p.x, p.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
        }

        function clearBoard() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', stop);
        canvas.addEventListener('touchstart', (e) => { start(e); e.preventDefault(); }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { draw(e); e.preventDefault(); }, {passive: false});
        window.addEventListener('touchend', stop);

        window.onload = () => { resize(); load('一'); };
        window.onresize = resize;
    </script>
</body>
</html>
