<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kanji Lớp 1 - Pro</title>
    <style>
        :root { --danger: #d63031; --bg: #ffffff; --header-bg: #f8f9fa; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); overflow: hidden; height: 100vh; }

        /* MÀN HÌNH CHÍNH */
        #home-screen { 
            height: 100vh; display: flex; flex-direction: column; 
            padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom) 15px; overflow-y: auto; 
        }
        .grid-kanji { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); 
            gap: 12px; padding: 20px 0 50px 0;
        }
        .card-kanji { 
            aspect-ratio: 1/1; border: 1.5px solid #333; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; 
            font-size: clamp(22px, 6vw, 28px); font-weight: 600; cursor: pointer;
            background: white; transition: 0.2s;
        }
        .card-kanji:active { background: #f0f0f0; }

        /* MÀN HÌNH LUYỆN TẬP */
        #learn-screen { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: white; display: none; flex-direction: column; z-index: 100;
        }

        /* THANH ĐIỀU HƯỚNG TRÊN CÙNG */
        .nav-top { 
            padding: 10px 15px; border-bottom: 1px solid #eee; display: flex; 
            justify-content: space-between; align-items: center; 
            background: var(--header-bg);
            padding-top: max(10px, env(safe-area-inset-top)); 
            padding-left: max(15px, env(safe-area-inset-left));
            padding-right: max(15px, env(safe-area-inset-right));
        }
        .btn-nav { 
            padding: 8px 14px; border: none; border-radius: 10px; font-weight: 600; 
            font-size: 15px; cursor: pointer; background: #eee; color: #333;
            transition: opacity 0.2s; 
        }
        .btn-nav:active { opacity: 0.7; }
        .btn-back { background: #e0e0e0; }
        .btn-clear { background: var(--danger); color: white; }

        /* KHU VỰC HIỂN THỊ CHÍNH */
        .main-view { 
            flex: 1; display: flex; flex-direction: row; overflow: hidden;
            padding: 0 env(safe-area-inset-left) 0 env(safe-area-inset-right);
        }
        /* Tăng kích thước box bên phải (khung vẽ) */
        .main-view .box:first-child {
            flex: 1;               /* khung GIF giữ nguyên */
        }
        .main-view .box:last-child {
            flex: 1.4;              /* khung vẽ rộng gấp 1.4 lần khung GIF */
        }
        .box { 
            display: flex; align-items: center; justify-content: center; 
            padding: 12px; position: relative; 
        }
        
        #kanji-gif { 
            max-width: 80%; max-height: 80%; object-fit: contain; border-radius: 12px; 
        }

        /* BẢNG VẼ - tăng nhẹ kích thước tối đa */
        .canvas-container { 
            position: relative; width: 100%; aspect-ratio: 1/1; 
            max-width: min(450px, 45vh, 45vw); /* tăng từ 400px lên 450px */
            border: 2px solid #333; background: white; border-radius: 8px;
        }
        canvas { 
            width: 100%; height: 100%; touch-action: none; display: block;
            background-image: linear-gradient(#f0f0f0 1px, transparent 1px), 
                              linear-gradient(90deg, #f0f0f0 1px, transparent 1px); 
            background-size: 20% 20%;
        }
        #trace-text { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            font-size: min(200px, 25vw, 25vh); color: rgba(0,0,0,0.05); 
            pointer-events: none; white-space: nowrap; line-height: 1;
        }

        /* XOAY DỌC - điều chỉnh tỷ lệ và kích thước tương ứng */
        @media (max-aspect-ratio: 1/1) {
            .main-view { flex-direction: column; }
            .main-view .box:first-child {
                flex: 1;
            }
            .main-view .box:last-child {
                flex: 1.4;               /* khung dưới cao hơn khung trên */
            }
            .box { padding: 8px; }
            .canvas-container { 
                max-width: min(400px, 80vw); /* tăng từ 360px,72vw lên 400px,80vw */
            }
        }
    </style>
</head>
<body>

    <div id="home-screen">
        <h2 style="text-align: center; padding: 20px 0 10px;">80 Kanji Lớp 1</h2>
        <div class="grid-kanji" id="kanjiGrid"></div>
    </div>

    <div id="learn-screen">
        <div class="nav-top">
            <button class="btn-nav btn-back" onclick="goHome()">← QUAY LẠI</button>
            <h2 id="current-title" style="font-size: 18px;">一</h2>
            <button class="btn-nav btn-clear" onclick="clearBoard()">XÓA BẢNG</button>
        </div>

        <div class="main-view">
            <div class="box">
                <img id="kanji-gif" src="" alt="GIF" onerror="this.style.display='none'">
            </div>
            <div class="box">
                <div class="canvas-container">
                    <div id="trace-text"></div>
                    <canvas id="canvas"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Khai báo biến toàn cục
        let canvas, ctx, gif, trace, title, home, learn;
        let drawing = false;
        const kanjiData = ["一", "右", "雨", "円", "王", "音", "下", "火", "花", "貝", "学", "気", "九", "休", "玉", "金", "空", "月", "犬", "見", "五", "口", "校", "左", "三", "山", "子", "四", "糸", "字", "耳", "七", "車", "手", "十", "出", "女", "小", "上", "森", "人", "水", "正", "生", "青", "夕", "石", "赤", "千", "川", "先", "早", "草", "足", "村", "大", "男", "竹", "中", "虫", "町", "天", "田", "土", "二", "日", "入", "年", "白", "八", "百", "文", "木", "本", "名", "目", "立", "力", "林"];

        function init() {
            home = document.getElementById('home-screen');
            learn = document.getElementById('learn-screen');
            canvas = document.getElementById('canvas');
            ctx = canvas.getContext('2d');
            gif = document.getElementById('kanji-gif');
            trace = document.getElementById('trace-text');
            title = document.getElementById('current-title');

            const grid = document.getElementById('kanjiGrid');
            kanjiData.forEach(k => {
                const div = document.createElement('div');
                div.className = 'card-kanji';
                div.innerText = k;
                div.onclick = () => startLearn(k);
                grid.appendChild(div);
            });

            // Gán sự kiện vẽ
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseleave', stopDrawing);
            canvas.addEventListener('touchstart', startDrawing, { passive: false });
            canvas.addEventListener('touchmove', draw, { passive: false });
            canvas.addEventListener('touchend', stopDrawing);
            canvas.addEventListener('touchcancel', stopDrawing);

            window.addEventListener('resize', () => requestAnimationFrame(resizeCanvas));
            window.addEventListener('orientationchange', () => setTimeout(() => requestAnimationFrame(resizeCanvas), 100));
        }

        function startLearn(k) {
            home.style.display = 'none';
            learn.style.display = 'flex';
            title.innerText = 'Chữ: ' + k;
            trace.innerText = k;
            gif.src = k + '-order.gif';
            gif.style.display = ''; // hiện lại nếu trước đó bị lỗi
            requestAnimationFrame(() => setTimeout(resizeCanvas, 50));
        }

        // Hàm global cho nút back
        function goHome() {
            home.style.display = 'flex';
            learn.style.display = 'none';
            gif.src = '';
        }

        // Hàm global cho nút xóa
        function clearBoard() {
            if (ctx) ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function resizeCanvas() {
            if (!canvas || !canvas.parentElement) return;
            const container = canvas.parentElement;
            const w = container.clientWidth;
            const h = container.clientHeight;
            canvas.width = w;
            canvas.height = h;
            clearBoard();
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            return {
                x: Math.min(Math.max((clientX - rect.left) * scaleX, 0), canvas.width),
                y: Math.min(Math.max((clientY - rect.top) * scaleY, 0), canvas.height)
            };
        }

        function startDrawing(e) {
            e.preventDefault?.();
            drawing = true;
            ctx.beginPath();
            draw(e);
        }

        function stopDrawing() {
            drawing = false;
            ctx.beginPath();
        }

        function draw(e) {
            if (!drawing) return;
            e.preventDefault?.();
            const p = getPos(e);
            ctx.lineWidth = Math.max(8, canvas.width / 40);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = '#2d3436';
            ctx.lineTo(p.x, p.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
