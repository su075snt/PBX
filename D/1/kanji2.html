<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kanji Lớp 1 - Pro</title>
    <style>
        :root { --danger: #d63031; --bg: #ffffff; --header-bg: #f8f9fa; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); overflow: hidden; height: 100vh; }

        /* MÀN HÌNH CHÍNH */
        #home-screen { 
            height: 100vh; display: flex; flex-direction: column; 
            padding: env(safe-area-inset-top) 15px; overflow-y: auto; 
        }
        .grid-kanji { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(55px, 1fr)); 
            gap: 12px; padding: 20px 0 50px 0;
        }
        .card-kanji { 
            aspect-ratio: 1/1; border: 1.5px solid #333; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; 
            font-size: 22px; font-weight: bold; cursor: pointer;
        }

        /* MÀN HÌNH LUYỆN TẬP */
        #learn-screen { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: white; display: none; flex-direction: column; z-index: 100;
        }

        /* THANH ĐIỀU HƯỚNG TRÊN CÙNG (Đã sửa lỗi iPhone) */
        .nav-top { 
            padding: 10px 15px; border-bottom: 1px solid #eee; display: flex; 
            justify-content: space-between; align-items: center; 
            background: var(--header-bg);
            padding-top: calc(10px + env(safe-area-inset-top)); /* Tránh tai thỏ */
        }
        .btn-nav { padding: 8px 12px; border: none; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; }
        .btn-back { background: #eee; color: #333; }
        .btn-clear { background: var(--danger); color: white; }

        /* KHU VỰC HIỂN THỊ CHÍNH (Full Screen) */
        .main-view { flex: 1; display: flex; flex-direction: row; overflow: hidden; }
        .box { flex: 1; display: flex; align-items: center; justify-content: center; padding: 10px; position: relative; }
        
        #kanji-gif { max-width: 95%; max-height: 95%; border-radius: 10px; }

        /* BẢNG VẼ */
        .canvas-container { position: relative; width: 95%; aspect-ratio: 1/1; max-width: 450px; border: 2px solid #333; background: white; }
        canvas { width: 100%; height: 100%; touch-action: none; 
            background-image: linear-gradient(#f0f0f0 1px, transparent 1px), linear-gradient(90deg, #f0f0f0 1px, transparent 1px); 
            background-size: 50% 50%; 
        }
        #trace-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 220px; color: rgba(0,0,0,0.05); pointer-events: none; }

        /* ĐIỀU CHỈNH KHI XOAY DỌC (Mobile) */
        @media (max-aspect-ratio: 1/1) {
            .main-view { flex-direction: column; }
            .box { height: 50%; width: 100%; }
        }
    </style>
</head>
<body>

    <div id="home-screen">
        <h2 style="text-align: center; padding: 20px 0;">80 Kanji Lớp 1</h2>
        <div class="grid-kanji" id="kanjiGrid"></div>
    </div>

    <div id="learn-screen">
        <div class="nav-top">
            <button class="btn-nav btn-back" onclick="goHome()">← QUAY LẠI</button>
            <h2 id="current-title" style="font-size: 18px;">一</h2>
            <button class="btn-nav btn-clear" onclick="clearBoard()">XÓA BẢNG</button>
        </div>

        <div class="main-view">
            <div class="box">
                <img id="kanji-gif" src="" alt="GIF">
            </div>
            <div class="box">
                <div class="canvas-container">
                    <div id="trace-text"></div>
                    <canvas id="canvas"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const kanjiData = ["一", "右", "雨", "円", "王", "音", "下", "火", "花", "貝", "学", "気", "九", "休", "玉", "金", "空", "月", "犬", "見", "五", "口", "校", "左", "三", "山", "子", "四", "糸", "字", "耳", "七", "車", "手", "十", "出", "女", "小", "上", "森", "人", "水", "正", "生", "青", "夕", "石", "赤", "千", "川", "先", "早", "草", "足", "村", "大", "男", "竹", "中", "虫", "町", "天", "田", "土", "二", "日", "入", "年", "白", "八", "百", "文", "木", "本", "名", "目", "立", "力", "林"];

        const home = document.getElementById('home-screen');
        const learn = document.getElementById('learn-screen');
        const grid = document.getElementById('kanjiGrid');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const gif = document.getElementById('kanji-gif');
        const trace = document.getElementById('trace-text');
        let drawing = false;

        kanjiData.forEach(k => {
            const div = document.createElement('div');
            div.className = 'card-kanji';
            div.innerText = k;
            div.onclick = () => startLearn(k);
            grid.appendChild(div);
        });

        function startLearn(k) {
            home.style.display = 'none';
            learn.style.display = 'flex';
            document.getElementById('current-title').innerText = "Chữ: " + k;
            trace.innerText = k;
            gif.src = k + "-order.gif"; // Khớp file của bạn
            setTimeout(resize, 200); 
        }

        function goHome() {
            home.style.display = 'flex';
            learn.style.display = 'none';
            gif.src = ""; 
        }

        function resize() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            clearBoard();
        }

        function clearBoard() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: cx - rect.left, y: cy - rect.top };
        }

        function start(e) { drawing = true; draw(e); }
        function stop() { drawing = false; ctx.beginPath(); }
        function draw(e) {
            if (!drawing) return;
            const p = getPos(e);
            ctx.lineWidth = 14; ctx.lineCap = 'round'; ctx.strokeStyle = '#2d3436';
            ctx.lineTo(p.x, p.y); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(p.x, p.y);
            if(e.touches) e.preventDefault();
        }

        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', stop);
        canvas.addEventListener('touchstart', (e) => { start(e); }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { draw(e); }, {passive: false});
        window.addEventListener('touchend', stop);
        window.addEventListener('resize', resize);
        window.addEventListener('orientationchange', () => setTimeout(resize, 400));
    </script>
</body>
</html>
