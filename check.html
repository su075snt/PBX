<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <!-- Tối ưu hiển thị trên iPhone -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- Cấu hình để chạy như 1 App (Xóa thanh địa chỉ và thanh tìm kiếm Safari) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Checklist">

    <title>Checklist</title>
    <style>
        :root {
            --safe-area-top: env(safe-area-inset-top);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            margin: 0;
            /* Tránh bị che bởi "tai thỏ" iPhone */
            padding: calc(var(--safe-area-top) + 15px) 15px 20px 15px;
            color: #000;
        }

        /* 3 hàng ghi chú */
        .notes-section {
            margin-bottom: 25px;
        }

        .note-line {
            display: flex;
            align-items: flex-end;
            margin-bottom: 15px;
        }

        .note-line span {
            font-size: 14px;
            font-weight: bold;
            margin-right: 8px;
            color: #555;
            min-width: 55px;
        }

        .note-line input {
            border: none;
            border-bottom: 1px solid #ccc;
            flex: 1;
            padding: 5px 0;
            font-size: 16px;
            outline: none;
            background: transparent;
        }

        /* Danh sách checklist */
        .container {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .column {
            width: 100%;
        }

        .checklist-item {
            display: flex;
            align-items: center;
            padding: 14px 0;
            border-bottom: 0.5px solid #d1d1d6; /* Đường kẻ mảnh kiểu iOS */
        }

        /* Checkbox to, dễ bấm cho ngón tay */
        input[type="checkbox"] {
            width: 24px;
            height: 24px;
            margin-right: 15px;
            cursor: pointer;
            -webkit-appearance: checkbox;
        }

        label {
            font-size: 17px;
            flex: 1;
            cursor: pointer;
            word-break: break-all;
        }

        /* Hiển thị 2 cột nếu quay ngang màn hình hoặc dùng iPad */
        @media (min-width: 600px) {
            .container {
                display: grid;
                grid-template-columns: 1fr 1fr;
                column-gap: 40px;
            }
        }
    </style>
</head>
<body>

    <!-- 3 hàng ghi chú trên cùng -->
    <div class="notes-section">
        <div class="note-line"><span>NOTE 1</span> <input type="text" placeholder="..."></div>
        <div class="note-line"><span>NOTE 2</span> <input type="text" placeholder="..."></div>
        <div class="note-line"><span>NOTE 3</span> <input type="text" placeholder="..."></div>
    </div>

    <div class="container">
        <!-- Cột bên trái -->
        <div class="column">
            <div class="checklist-item"><input type="checkbox" id="i1"><label for="i1">ケーブル　TEL-LAN　？</label></div>
            <div class="checklist-item"><input type="checkbox" id="i2"><label for="i2">ヒモ</label></div>
            <div class="checklist-item"><input type="checkbox" id="i3"><label for="i3">プラグ　RJ 45　RJ 11</label></div>
            <div class="checklist-item"><input type="checkbox" id="i4"><label for="i4">端子ーローゼット</label></div>
            <div class="checklist-item"><input type="checkbox" id="i5"><label for="i5">モール　系</label></div>
            <div class="checklist-item"><input type="checkbox" id="i6"><label for="i6">インシュロック</label></div>
            <div class="checklist-item"><input type="checkbox" id="i7"><label for="i7">ベルクロ</label></div>
            <div class="checklist-item"><input type="checkbox" id="i8"><label for="i8">脚立　？</label></div>
            <div class="checklist-item"><input type="checkbox" id="i9"><label for="i9">上履き</label></div>
            <div class="checklist-item"><input type="checkbox" id="i10"><label for="i10">ジャンパー線</label></div>
        </div>

        <!-- Cột bên phải -->
        <div class="column">
            <div class="checklist-item"><input type="checkbox" id="i11"><label for="i11">図面　？下見図面？</label></div>
            <div class="checklist-item"><input type="checkbox" id="i12"><label for="i12">オーダー</label></div>
            <div class="checklist-item"><input type="checkbox" id="i13"><label for="i13">納品　？TEL　HUB？</label></div>
            <div class="checklist-item"><input type="checkbox" id="i14"><label for="i14">ラック　？</label></div>
            <div class="checklist-item"><input type="checkbox" id="i15"><label for="i15">完了書</label></div>
            <div class="checklist-item"><input type="checkbox" id="i16"><label for="i16">ライセンス</label></div>
        </div>
    </div>

</body>
</html>
