<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <!-- Cấu hình chạy Full màn hình khi lưu ra Home Screen -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Paint App">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Paint iOS</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #fff;
            touch-action: none;
        }
        canvas {
            display: block;
            touch-action: none;
            background-color: #fff;
        }
        /* Nút xóa ở góc trên bên phải */
        .btn-delete {
            position: absolute;
            top: calc(15px + env(safe-area-inset-top));
            right: calc(15px + env(safe-area-inset-right));
            width: 45px; height: 45px;
            background-color: #ff3b30;
            color: white; border: none; border-radius: 50%;
            font-size: 24px; z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            display: flex; justify-content: center; align-items: center;
            -webkit-tap-highlight-color: transparent; /* Xóa khung xanh khi chạm trên iOS */
        }
        .btn-delete:active {
            background-color: #cc2b23;
            transform: scale(0.9);
        }
    </style>
</head>
<body>

    <canvas id="paintCanvas"></canvas>
    <!-- Sử dụng ontouchstart để xóa nhanh hơn trên iPhone -->
    <button class="btn-delete" ontouchstart="clearCanvas()" onclick="clearCanvas()">✕</button>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = '#000';
        }

        window.addEventListener('resize', resize);
        window.addEventListener('orientationchange', () => setTimeout(resize, 100));
        resize();

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function startPosition(e) {
            if(e.target.tagName === 'BUTTON') return;
            drawing = true;
            const pos = getPos(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function finishedPosition() {
            drawing = false;
        }

        function draw(e) {
            if (!drawing) return;
            const pos = getPos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }

        // Sự kiện chuột
        canvas.addEventListener('mousedown', startPosition);
        canvas.addEventListener('mouseup', finishedPosition);
        canvas.addEventListener('mousemove', draw);

        // Sự kiện cảm ứng iOS
        canvas.addEventListener('touchstart', (e) => {
            if(e.target.tagName !== 'BUTTON') e.preventDefault();
            startPosition(e);
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            draw(e);
        }, { passive: false });

        canvas.addEventListener('touchend', finishedPosition);

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
    </script>
</body>
</html>
